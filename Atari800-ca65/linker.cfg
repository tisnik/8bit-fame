FEATURES
{
    STARTADDRESS: default = $2000;
}

SYMBOLS
{

}

MEMORY
{
    ZP:         start = $0082, size = $007E, type = rw, define = yes;
    HEADER:     start = $0000, size = $0006, file = %O;
    RAM:        start = %S,    size = $8000, file = %O;
    TRAILER:    start = $0000, size = $0006, file = %O; 
}

SEGMENTS
{
    EXEHDR:   load = HEADER,  type = ro;
    STARTUP:  load = RAM,     type = ro, define = yes, optional = yes;
    ZEROPAGE: load = ZP,      type = zp;
    CODE:     load = RAM,     type = ro, define = yes;
    AUTOSTRT: load = TRAILER, type = ro;
    FONT:     load = RAM,     type = ro, optional = yes, align=1024;
    BSS:      load = RAM,     type = bss, define = yes, align=1024;
}

FEATURES
{
    CONDES: segment = INIT,
        type = constructor,
        label = __CONSTRUCTOR_TABLE__,
        count = __CONSTRUCTOR_COUNT__;
    CONDES: segment = RODATA,
        type = destructor,
        label = __DESTRUCTOR_TABLE__,
        count = __DESTRUCTOR_COUNT__;
    CONDES: type = interruptor,
        segment = RODATA,
        label = __INTERRUPTOR_TABLE__,
        count = __INTERRUPTOR_COUNT__;
}
